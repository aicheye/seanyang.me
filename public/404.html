<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — seanyang.me</title>
    <style>
      :root {
        --text: #a8a29e;
        --text-h: #fafaf9;
        --bg: #0c0a09;
        --accent: #f08c72;
        font: 16px/1.7 system-ui, -apple-system, sans-serif;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
      }
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100svh; }
      .container { text-align: center; }
      h1 { font-size: 28px; font-weight: 600; color: var(--text-h); letter-spacing: -0.5px; margin: 0 0 4px; }
      p { margin: 0 0 20px; }
      a { color: var(--accent); text-decoration: none; font-size: 14px; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <p>page not found</p>
      <a href="/">← go home</a>
    </div>
  </body>
</html>
